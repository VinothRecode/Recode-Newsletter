<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weekly Recode Newspaper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo-section">
    <img src="images/logo.jpg" alt="Company Logo" class="logo">
    <h1>Weekly Recode Newspaper</h1>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn active" onclick="showPage(1)">📰 News</button>
    <button class="nav-btn" onclick="showPage(2)">💡 Did You Know</button>
    <button class="nav-btn" onclick="showPage(3)">🧠 Quiz</button>
    <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
  </div>
</header>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <div class="container" id="newsContainer"></div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
  <h2>💡 Did You Know?</h2>

  <div class="flip-container stagger">

    <div class="flip-card" onclick="this.classList.toggle('flip')">
      <div class="flip-inner">
        <div class="flip-front">AI</div>
        <div class="flip-back">AI improves with better data.</div>
      </div>
    </div>

    <div class="flip-card" onclick="this.classList.toggle('flip')">
      <div class="flip-inner">
        <div class="flip-front">Space</div>
        <div class="flip-back">Space is completely silent.</div>
      </div>
    </div>

    <div class="flip-card" onclick="this.classList.toggle('flip')">
      <div class="flip-inner">
        <div class="flip-front">Ocean</div>
        <div class="flip-back">80% of ocean is unexplored.</div>
      </div>
    </div>

    <div class="flip-card" onclick="this.classList.toggle('flip')">
      <div class="flip-inner">
        <div class="flip-front">Brain</div>
        <div class="flip-back">Brain uses 20% of your energy.</div>
      </div>
    </div>

    <div class="flip-card" onclick="this.classList.toggle('flip')">
      <div class="flip-inner">
        <div class="flip-front">Tech</div>
        <div class="flip-back">First computer weighed 27 tons.</div>
      </div>
    </div>

  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page hidden">

  <!-- QUIZ FIRST -->
  <h2>🧠 Today's Quiz</h2>
  <div class="box quiz-box">
    <p id="quizQ"></p>
    <button onclick="showAnswer()">Show Answer</button>
    <p id="quizA" class="hidden"></p>
  </div>

  <!-- WINNER SECTION -->
  <h2>🏆 Last Week Winner</h2>
  <div class="box winner-box">

    <img id="winnerImg" class="winner-img" src="images/winner.jpg" alt="Winner">

    <p id="winner"></p>

  </div>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- POPUP -->
<div id="popup" class="popup">

  <div class="popup-content">

    <span class="close" onclick="closePopup()">×</span>

    <!-- Small Image -->
    <img id="popupImg" class="popup-img">

    <!-- Title -->
    <h2 id="popupTitle" class="popup-title"></h2>

    <!-- News Content -->
    <p id="popupText" class="popup-text"></p>

    <!-- Navigation -->
    <div class="navBtns">
      <button onclick="prevNews()">⬅</button>
      <button onclick="nextNews()">➡</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
