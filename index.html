<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Newspaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-top">
      <div class="masthead-meta">
        
        <span class="issue-label" id="currentDate"></span>
      </div>
      <div class="masthead-center">
        <img src="images/logo.jpg" alt="Company Logo" class="logo">
        <h1 class="newspaper-title">Weekly    Newspaper</h1>
        <p class="newspaper-tagline">Unlocking Insights Unleashing AI</p>
      </div>
      <div class="masthead-actions">
        <button class="theme-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>

    <nav class="nav-strip">
      <button class="nav-btn active" onclick="showPage(1)" data-page="1">
        <span class="nav-icon">📰</span>
        <span>Headlines</span>
      </button>
      <button class="nav-btn" onclick="showPage(2)" data-page="2">
        <span class="nav-icon">💡</span>
        <span>Did You Know</span>
      </button>
      <button class="nav-btn" onclick="showPage(3)" data-page="3">
        <span class="nav-icon">🧠</span>
        <span>Quiz</span>
      </button>
    </nav>
  </header>

  <!-- PAGE 1: NEWS -->
  <div id="page1" class="page">
    <div class="section-label">
      <span class="section-rule"></span>
      <span class="section-name">Top Headlines</span>
      <span class="section-rule"></span>
    </div>
    <div class="news-grid" id="newsContainer"></div>
  </div>

  <!-- PAGE 2: DID YOU KNOW -->
  <div id="page2" class="page hidden">
    <div class="section-label">
      <span class="section-rule"></span>
      <span class="section-name">Did You Know?</span>
      <span class="section-rule"></span>
    </div>
    <p class="page-intro">Click any card to reveal the fact hidden inside.</p>
    <div class="flip-container stagger"></div>
  </div>

  <!-- PAGE 3: QUIZ -->
  <div id="page3" class="page hidden">
    <div class="section-label">
      <span class="section-rule"></span>
      <span class="section-name">Weekly Challenge</span>
      <span class="section-rule"></span>
    </div>
    <div class="quiz-layout">
      <div class="left-section">
        <div class="quiz-block">
          <h2 class="block-title"><span class="title-accent">🧠</span> This Week's Quiz</h2>
          <div class="quiz-image-box">
            <img src="images/today-quiz.jpg" class="quiz-img" alt="Quiz">
            <div class="image-caption">Tap the image to zoom</div>
          </div>
        </div>

        <div class="answer-block">
          <h2 class="block-title"><span class="title-accent">✅</span> Last Week's Answer</h2>
          <div class="answer-image-box">
            <img src="images/last-week-answer.jpg" class="answer-img" alt="Answer">
          </div>
        </div>
      </div>

      <div class="right-section">
        <h2 class="block-title"><span class="title-accent">🏆</span> Last Week's Champion</h2>
        <div class="winner-card">
          <div class="winner-glow"></div>
          <div class="winner-image">
            <img src="images/winner.jpg" alt="Winner">
            <div class="winner-badge">🥇</div>
          </div>
          <div class="winner-details">
            <h3 class="winner-name"></h3>
            <p id="winnerTitle" class="winner-role"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay" role="presentation"></div>

  <!-- POPUP / ARTICLE MODAL -->
  <div id="popup" class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-content">
      <button class="close-btn" onclick="closePopup()" aria-label="Close article">✕</button>
      <div class="popup-img-wrap">
        <img id="popupImg" class="popup-img" alt="">
        <div class="popup-counter" id="popupCounter"></div>
      </div>
      <div class="popup-body">
        <div class="popup-category">Breaking News</div>
        <h2 id="popupTitle" class="popup-title"></h2>
        <div class="popup-divider"></div>
        <p id="popupText" class="popup-text"></p>
      </div>
      <div class="popup-nav">
        <button class="popup-nav-btn" onclick="prevNews()" aria-label="Previous article">
          <span>←</span> Previous
        </button>
        <button class="popup-nav-btn primary" onclick="nextNews()" aria-label="Next article">
          Next <span>→</span>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
